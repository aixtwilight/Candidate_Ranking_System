ai_usage_summary: |
  Used ChatGPT for documentation review, implementation guidance, debugging,
  code review, Docker deployment support, and reproducibility improvements.
  The ranking system remains deterministic, CPU-only, and performs no hosted
  LLM inference or network calls during candidate ranking

methodology_summary: |
  Deterministic rule-based ranker for a founding Senior AI Engineer JD. It
  combines title/seniority fit, production retrieval/search/recommendation
  evidence from career text, trusted skill evidence weighted by proficiency,
  duration, endorsements and assessments, product-company background, location
  fit, and Redrob availability signals. Strong penalties handle keyword
  stuffing, services-only backgrounds without product evidence, pure research
  or framework-demo profiles, inconsistent dates, unsupported expert skills,
  and CV/speech-heavy profiles without NLP/IR depth. Runtime is under one
  minute for 100k candidates on CPU and uses only Python standard library.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true